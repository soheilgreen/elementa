name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . --ignore E402
      - run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libglib2.0-0 libxcb-cursor0 xvfb

      - name: Install Python dependencies
        run: pip install numpy matplotlib scikit-fem gmsh pytest pytest-qt

      - name: Run tests (Linux with virtual display)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -m "not integration" --tb=short -q --ignore=tests/test_physics.py

      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -m "not integration" --tb=short -q --ignore=tests/test_physics.py

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
